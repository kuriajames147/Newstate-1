<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - Refer & Earn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-green-50 to-blue-50 min-h-screen">
  <div class="container mx-auto px-4 py-8">
    <div class="max-w-md mx-auto">
      <div class="bg-white rounded-2xl shadow-xl p-8 text-center">
        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <i class="fas fa-check-circle text-green-600 text-4xl"></i>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Payment Successful!</h1>
        <p class="text-gray-600 mb-4">Thank you for activating your account.</p>
        <div class="bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-6">
          <p class="text-sm text-yellow-800">
            <i class="fas fa-spinner fa-spin mr-2"></i>
            Activating your account...
          </p>
        </div>
        <div class="animate-pulse">
          <p class="text-gray-500 text-sm">Please wait while we redirect you to your dashboard...</p>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    const API_BASE = 'http://localhost:5000/api';
    
    function getToken() {
      return localStorage.getItem('token');
    }
    
    async function checkActivation() {
      let attempts = 0;
      const maxAttempts = 20;
      
      const interval = setInterval(async () => {
        attempts++;
        
        try {
          const token = getToken();
          const response = await fetch(`${API_BASE}/auth/me`, {
            headers: { 'Authorization': `Bearer ${token}` }
          });
          const data = await response.json();
          
          if (data.user && data.user.registration_paid) {
            clearInterval(interval);
            window.location.href = 'dashboard.html';
          } else if (attempts >= maxAttempts) {
            clearInterval(interval);
            window.location.href = 'dashboard.html';
          }
        } catch (error) {
          console.error('Status check error:', error);
          if (attempts >= maxAttempts) {
            window.location.href = 'dashboard.html';
          }
        }
      }, 3000);
    }
    
    checkActivation();
  </script>
</body>
</html>
