<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Settings - Refer & Earn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ============================================ */
        /* DARK MODE CSS VARIABLES */
        /* ============================================ */
        
        /* Light mode (default) */
        :root {
            --bg-primary: #f3f4f6;
            --bg-secondary: #ffffff;
            --text-primary: #1f2937;
            --text-secondary: #4b5563;
            --border-color: #e5e7eb;
            --card-bg: #ffffff;
            --header-bg: #ffffff;
            --input-bg: #ffffff;
            --input-border: #d1d5db;
        }
        
        /* Dark mode */
        .dark {
            --bg-primary: #111827;
            --bg-secondary: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --border-color: #374151;
            --card-bg: #1f2937;
            --header-bg: #1f2937;
            --input-bg: #374151;
            --input-border: #4b5563;
        }
        
        /* Apply theme variables */
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        
        .bg-white {
            background-color: var(--card-bg) !important;
        }
        
        .bg-gray-50, .bg-gray-100 {
            background-color: var(--bg-secondary) !important;
        }
        
        .text-gray-800, .text-gray-700, .text-gray-600 {
            color: var(--text-primary) !important;
        }
        
        .text-gray-500 {
            color: var(--text-secondary) !important;
        }
        
        .border, .border-gray-200, .border-gray-300 {
            border-color: var(--border-color) !important;
        }
        
        input, textarea {
            background-color: var(--input-bg) !important;
            border-color: var(--input-border) !important;
            color: var(--text-primary) !important;
        }
        
        input:focus, textarea:focus {
            border-color: #10b981 !important;
            outline: none !important;
        }
        
        input::placeholder, textarea::placeholder {
            color: var(--text-secondary) !important;
        }
        
        .bg-gray-100, .bg-gray-50 {
            background-color: var(--bg-secondary) !important;
        }
        
        /* Toast animation */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
            animation: slideInRight 0.3s ease-out;
        }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Transition for smooth theme switching */
        * {
            transition: background-color 0.2s ease, border-color 0.2s ease, color 0.2s ease;
        }
        
        /* Image preview */
        .image-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #10b981;
        }
    </style>
</head>
<body>

<div class="container mx-auto px-4 py-8 max-w-4xl">
    <!-- Header with Theme Toggle -->
    <div class="flex items-center justify-between mb-8">
        <div>
            <a href="dashboard.html" class="text-green-600 hover:text-green-700 mb-2 inline-block">
                <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
            </a>
            <h1 class="text-3xl font-bold text-gray-800">Profile Settings</h1>
            <p class="text-gray-500 mt-1">Manage your personal information</p>
        </div>
        <div class="flex items-center gap-3">
            <!-- Dark/Light Mode Toggle Button -->
            <button id="themeToggle" class="p-3 rounded-full bg-gray-100 hover:bg-gray-200 transition-all shadow-md">
                <i id="themeIcon" class="fas fa-moon text-gray-700 text-xl"></i>
            </button>
            <div class="w-16 h-16 bg-gradient-to-r from-green-500 to-green-600 rounded-full flex items-center justify-center">
                <i class="fas fa-user-circle text-4xl text-white"></i>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Sidebar Info Card -->
        <div class="lg:col-span-1">
            <div class="bg-white rounded-xl shadow-sm p-6 sticky top-6">
                <div class="text-center mb-4">
                    <div class="relative inline-block">
                        <img id="profileImagePreview" src="https://ui-avatars.com/api/?background=10b981&color=fff&rounded=true" alt="Profile" class="image-preview">
                        <label for="profileImage" class="absolute bottom-0 right-0 bg-green-600 text-white p-1 rounded-full cursor-pointer hover:bg-green-700">
                            <i class="fas fa-camera text-xs"></i>
                        </label>
                        <input type="file" id="profileImage" accept="image/*" class="hidden" onchange="previewImage(event)">
                    </div>
                    <h3 id="displayName" class="font-bold text-gray-800 text-lg mt-3">Loading...</h3>
                    <p id="displayEmail" class="text-sm text-gray-500">Loading...</p>
                </div>
                
                <div class="border-t pt-4 space-y-3">
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-500">Member since</span>
                        <span id="memberSince" class="text-gray-700">Loading...</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-500">Referral Code</span>
                        <span id="referralCode" class="text-green-600 font-mono text-sm">Loading...</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-500">Total Referrals</span>
                        <span id="totalReferrals" class="text-gray-700">0</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-gray-500">Commission Earned</span>
                        <span id="commissionEarned" class="text-green-600 font-semibold">Ksh 0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="lg:col-span-2">
            <!-- Personal Information -->
            <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4">
                    <i class="fas fa-user mr-2 text-green-600"></i>Personal Information
                </h2>
                
                <form id="profileForm" class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-700 mb-2 font-medium">Full Name</label>
                            <input type="text" id="fullName" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2 font-medium">Username</label>
                            <input type="text" id="username" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-gray-700 mb-2 font-medium">Email Address</label>
                            <input type="email" id="email" class="w-full px-4 py-2 border rounded-lg bg-gray-100" readonly>
                        </div>
                        <div>
                            <label class="block text-gray-700 mb-2 font-medium">Phone Number</label>
                            <input type="tel" id="phone" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500">
                        </div>
                    </div>
                    
                    <div>
                        <label class="block text-gray-700 mb-2 font-medium">Bio / About</label>
                        <textarea id="bio" rows="3" class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Tell us about yourself..."></textarea>
                    </div>
                    
                    <div class="flex justify-end gap-3 pt-4">
                        <button type="button" onclick="resetForm()" class="px-6 py-2 border rounded-lg hover:bg-gray-50 transition">Cancel</button>
                        <button type="submit" class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition">
                            <i class="fas fa-save mr-2"></i>Save Changes
                        </button>
                    </div>
                </form>
            </div>

            <!-- Referral Link Card -->
            <div class="bg-white rounded-xl shadow-sm p-6">
                <h2 class="text-xl font-bold text-gray-800 mb-4">
                    <i class="fas fa-link mr-2 text-green-600"></i>Your Referral Link
                </h2>
                <div class="bg-gray-50 rounded-lg p-4">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
                        <code id="referralLinkDisplay" class="text-sm text-green-600 break-all">Loading...</code>
                        <button onclick="copyReferralLink()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition whitespace-nowrap">
                            <i class="fas fa-copy mr-2"></i>Copy Link
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:5000/api';
    
    // ============================================
    // DARK/LIGHT MODE FUNCTIONS
    // ============================================
    
    function initTheme() {
        const savedTheme = localStorage.getItem('theme');
        const icon = document.getElementById('themeIcon');
        
        if (savedTheme === 'dark') {
            document.documentElement.classList.add('dark');
            if (icon) icon.className = 'fas fa-sun text-yellow-500 text-xl';
        } else {
            document.documentElement.classList.remove('dark');
            if (icon) icon.className = 'fas fa-moon text-gray-700 text-xl';
        }
    }
    
    function toggleTheme() {
        const html = document.documentElement;
        const icon = document.getElementById('themeIcon');
        
        if (html.classList.contains('dark')) {
            html.classList.remove('dark');
            localStorage.setItem('theme', 'light');
            if (icon) icon.className = 'fas fa-moon text-gray-700 text-xl';
            showToast('Light mode activated', 'success');
        } else {
            html.classList.add('dark');
            localStorage.setItem('theme', 'dark');
            if (icon) icon.className = 'fas fa-sun text-yellow-500 text-xl';
            showToast('Dark mode activated', 'success');
        }
    }
    
    // ============================================
    // TOAST NOTIFICATION
    // ============================================
    
    function showToast(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `toast ${type === 'error' ? 'bg-red-500' : 'bg-green-500'} text-white px-4 py-2 rounded-lg shadow-lg`;
        toast.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'} mr-2"></i>${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    // ============================================
    // AUTHENTICATION
    // ============================================
    
    function getToken() {
        return localStorage.getItem('token');
    }
    
    if (!getToken()) {
        window.location.href = 'index.html';
    }
    
    // ============================================
    // PROFILE FUNCTIONS
    // ============================================
    
    function formatDate(dateString) {
        if (!dateString) return 'N/A';
        const date = new Date(dateString);
        return date.toLocaleDateString('en-KE', { year: 'numeric', month: 'long', day: 'numeric' });
    }
    
    function formatMoney(amount) {
        return `Ksh ${parseFloat(amount || 0).toLocaleString('en-KE', { minimumFractionDigits: 0, maximumFractionDigits: 2 })}`;
    }
    
    function previewImage(event) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('profileImagePreview').src = e.target.result;
        };
        reader.readAsDataURL(event.target.files[0]);
    }
    
    async function loadProfile() {
        try {
            const response = await fetch(`${API_BASE}/user/profile`, {
                headers: { 'Authorization': `Bearer ${getToken()}` }
            });
            const data = await response.json();
            
            if (data.success) {
                const user = data.user;
                
                // Update sidebar info
                document.getElementById('displayName').innerText = user.full_name || user.username;
                document.getElementById('displayEmail').innerText = user.email;
                document.getElementById('memberSince').innerText = formatDate(user.created_at);
                document.getElementById('referralCode').innerText = user.referral_code;
                document.getElementById('totalReferrals').innerText = user.referral_count || 0;
                document.getElementById('commissionEarned').innerHTML = formatMoney(user.total_commission_earned || user.total_earnings || 0);
                
                // Update form fields
                document.getElementById('fullName').value = user.full_name || '';
                document.getElementById('username').value = user.username;
                document.getElementById('email').value = user.email;
                document.getElementById('phone').value = user.phone || '';
                document.getElementById('bio').value = user.bio || '';
                
                // Update referral link
                const referralLink = `${window.location.origin}/index.html?ref=${user.referral_code}`;
                document.getElementById('referralLinkDisplay').innerText = referralLink;
            }
        } catch (error) {
            console.error('Error loading profile:', error);
            showToast('Error loading profile', 'error');
        }
    }
    
    async function updateProfile(event) {
        event.preventDefault();
        
        const profileData = {
            full_name: document.getElementById('fullName').value,
            username: document.getElementById('username').value,
            phone: document.getElementById('phone').value,
            bio: document.getElementById('bio').value
        };
        
        try {
            const response = await fetch(`${API_BASE}/user/profile`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${getToken()}`
                },
                body: JSON.stringify(profileData)
            });
            const data = await response.json();
            
            if (data.success) {
                showToast('Profile updated successfully!');
                loadProfile();
                
                const storedUser = JSON.parse(localStorage.getItem('user') || '{}');
                storedUser.username = profileData.username;
                localStorage.setItem('user', JSON.stringify(storedUser));
            } else {
                showToast(data.error, 'error');
            }
        } catch (error) {
            console.error('Error updating profile:', error);
            showToast('Error updating profile', 'error');
        }
    }
    
    function resetForm() {
        loadProfile();
    }
    
    function copyReferralLink() {
        const link = document.getElementById('referralLinkDisplay').innerText;
        navigator.clipboard.writeText(link);
        showToast('Referral link copied!');
    }
    
    // ============================================
    // EVENT LISTENERS
    // ============================================
    
    document.getElementById('profileForm').addEventListener('submit', updateProfile);
    
    const themeToggle = document.getElementById('themeToggle');
    if (themeToggle) {
        themeToggle.addEventListener('click', toggleTheme);
    }
    
    // Initialize theme and load profile
    initTheme();
    loadProfile();
</script>
</body>
</html>
