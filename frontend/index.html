<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refer & Earn - Kenya's Best Referral Program</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gradient-to-br from-green-50 via-blue-50 to-purple-50 min-h-screen">

<!-- ============================================ -->
<!-- REFERRAL CAPTURE - MUST BE FIRST SCRIPT      -->
<!-- ============================================ -->
<script>
    // CRITICAL: This runs immediately and captures referral code from URL
    (function() {
        console.log('========================================');
        console.log('🔍 REFERRAL CAPTURE ACTIVE');
        console.log('========================================');
        console.log('Current full URL:', window.location.href);
        console.log('URL path:', window.location.pathname);
        console.log('URL search params:', window.location.search);
        
        // Get the 'ref' parameter
        const urlParams = new URLSearchParams(window.location.search);
        const referralCode = urlParams.get('ref');
        
        console.log('Extracted referral code:', referralCode);
        
        if (referralCode && referralCode !== 'null' && referralCode !== 'undefined' && referralCode.trim() !== '') {
            // Store in sessionStorage
            sessionStorage.setItem('referral_code', referralCode.trim());
            console.log('✅✅✅ REFERRAL CODE CAPTURED AND STORED:', referralCode);
            
            // Also store in a global variable
            window.referralCode = referralCode;
            
            // Show visible alert for testing
            alert(`✅ Referral code captured: ${referralCode}\n\nComplete registration to credit your referrer!`);
        } else {
            console.log('❌ No referral code found in URL');
            console.log('   To test, visit: http://localhost:3000/index.html?ref=YOUR_CODE');
        }
        
        console.log('SessionStorage referral_code:', sessionStorage.getItem('referral_code'));
        console.log('========================================');
    })();
</script>

<div class="container mx-auto px-4 py-8">
    <div class="max-w-md mx-auto">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-gradient-to-r from-green-600 to-green-700 p-6 text-white text-center">
                <i class="fas fa-users text-5xl mb-3"></i>
                <h2 class="text-2xl font-bold">Join the Community</h2>
                <p class="text-green-100 mt-1">Start earning today!</p>
            </div>

            <div class="p-6">
                <div class="flex gap-2 mb-6 bg-gray-100 rounded-lg p-1">
                    <button id="loginTabBtn" class="flex-1 py-2 rounded-lg font-semibold transition-all bg-green-600 text-white">Login</button>
                    <button id="registerTabBtn" class="flex-1 py-2 rounded-lg font-semibold transition-all text-gray-600">Register</button>
                </div>

                <!-- Login Form -->
                <div id="loginForm">
                    <div class="space-y-4">
                        <input type="email" id="loginEmail" placeholder="Email" class="w-full px-4 py-3 border rounded-lg">
                        <input type="password" id="loginPassword" placeholder="Password" class="w-full px-4 py-3 border rounded-lg">
                        <button id="loginBtn" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold">Login</button>
                    </div>
                </div>

                <!-- Register Form -->
                <div id="registerForm" class="hidden">
                    <div class="space-y-4">
                        <input type="text" id="regUsername" placeholder="Username" class="w-full px-4 py-3 border rounded-lg">
                        <input type="email" id="regEmail" placeholder="Email" class="w-full px-4 py-3 border rounded-lg">
                        <input type="tel" id="regPhone" placeholder="Phone (0712345678)" class="w-full px-4 py-3 border rounded-lg">
                        <input type="password" id="regPassword" placeholder="Password" class="w-full px-4 py-3 border rounded-lg">
                        
                        <!-- REFERRAL CODE FIELD - Will be auto-filled -->
                        <div>
                            <label class="block text-gray-700 mb-2 font-semibold">
                                <i class="fas fa-gift text-green-600 mr-1"></i>
                                Referral Code
                            </label>
                            <input type="text" id="regReferralCode" 
                                   placeholder="Enter referral code if you have one" 
                                   class="w-full px-4 py-3 border rounded-lg"
                                   value="">
                            <p class="text-xs text-gray-500 mt-1" id="referralMessage">
                                Enter a referral code if you have one to credit your referrer!
                            </p>
                        </div>
                        
                        <button id="registerBtn" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700">Register</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:5000/api';
    
    // ============================================
    // AUTO-FILL REFERRAL CODE FIELD
    // ============================================
    
    function autoFillReferralCode() {
        const referralInput = document.getElementById('regReferralCode');
        const referralMessage = document.getElementById('referralMessage');
        
        // Get referral code from sessionStorage (set by the capture script)
        let referralCode = sessionStorage.getItem('referral_code');
        
        console.log('autoFillReferralCode - sessionStorage code:', referralCode);
        
        if (referralCode && referralCode !== 'null' && referralCode !== 'undefined' && referralCode.trim() !== '') {
            // Auto-fill the field
            referralInput.value = referralCode.trim();
            referralInput.style.backgroundColor = '#d1fae5';  // Light green
            referralInput.style.borderColor = '#10b981';
            referralInput.style.fontWeight = '500';
            
            // Update message
            referralMessage.innerHTML = '<i class="fas fa-check-circle text-green-600 mr-1"></i>✓ Referral code automatically applied! You were referred by a friend.';
            referralMessage.className = 'text-xs text-green-600 mt-1 font-semibold';
            
            console.log('✅ Referral code auto-filled:', referralCode);
        } else {
            console.log('ℹ️ No referral code to auto-fill');
            referralInput.style.backgroundColor = '#ffffff';
            referralInput.style.borderColor = '#d1d5db';
        }
    }
    
    function getReferralCode() {
        const referralInput = document.getElementById('regReferralCode');
        if (referralInput && referralInput.value && referralInput.value.trim() !== '') {
            return referralInput.value.trim();
        }
        return sessionStorage.getItem('referral_code');
    }
    
    function getToken() { return localStorage.getItem('token'); }
    function setToken(token) { localStorage.setItem('token', token); }
    
    function showToast(message, type) {
        const toast = document.createElement('div');
        toast.className = `fixed top-20 right-4 px-6 py-3 rounded-lg shadow-lg z-50 ${type === 'error' ? 'bg-red-500' : 'bg-green-500'} text-white`;
        toast.innerHTML = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
    
    function switchTab(tab) {
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const loginTab = document.getElementById('loginTabBtn');
        const registerTab = document.getElementById('registerTabBtn');
        
        if (tab === 'login') {
            loginForm.classList.remove('hidden');
            registerForm.classList.add('hidden');
            loginTab.classList.add('bg-green-600', 'text-white');
            loginTab.classList.remove('text-gray-600');
            registerTab.classList.remove('bg-green-600', 'text-white');
            registerTab.classList.add('text-gray-600');
        } else {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            registerTab.classList.add('bg-green-600', 'text-white');
            registerTab.classList.remove('text-gray-600');
            loginTab.classList.remove('bg-green-600', 'text-white');
            loginTab.classList.add('text-gray-600');
            
            // Auto-fill when switching to register tab
            autoFillReferralCode();
        }
    }
    
    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const btn = document.getElementById('loginBtn');
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Logging in...';
        
        try {
            const response = await fetch(`${API_BASE}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();
            
            if (data.success) {
                setToken(data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                window.location.href = data.user.registration_paid ? 'dashboard.html' : 'activation.html';
            } else {
                showToast(data.error, 'error');
            }
        } catch (error) {
            showToast('Login failed', 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Login';
        }
    }
    
    async function handleRegister() {
        const username = document.getElementById('regUsername').value;
        const email = document.getElementById('regEmail').value;
        const phone = document.getElementById('regPhone').value;
        const password = document.getElementById('regPassword').value;
        const referral_code = getReferralCode();
        
        console.log('========================================');
        console.log('📝 REGISTRATION');
        console.log('Username:', username);
        console.log('Email:', email);
        console.log('Phone:', phone);
        console.log('Referral code being sent:', referral_code);
        console.log('========================================');
        
        const btn = document.getElementById('registerBtn');
        
        if (!username || !email || !phone || !password) {
            showToast('Please fill all fields', 'error');
            return;
        }
        
        const phoneRegex = /^(?:254|0)(7|1)\d{8}$/;
        if (!phoneRegex.test(phone)) {
            showToast('Please enter a valid Kenyan phone number', 'error');
            return;
        }
        
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Creating account...';
        
        try {
            const requestBody = { username, email, phone, password };
            if (referral_code && referral_code.trim() !== '') {
                requestBody.referral_code = referral_code.trim();
            }
            
            const response = await fetch(`${API_BASE}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });
            
            const data = await response.json();
            
            if (data.success) {
                setToken(data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                showToast(data.message);
                sessionStorage.removeItem('referral_code');
                setTimeout(() => window.location.href = 'activation.html', 1500);
            } else {
                showToast(data.error, 'error');
            }
        } catch (error) {
            console.error('Registration error:', error);
            showToast('Registration failed. Please try again.', 'error');
        } finally {
            btn.disabled = false;
            btn.innerHTML = 'Register';
        }
    }
    
    // Initialize
    document.addEventListener('DOMContentLoaded', function() {
        console.log('DOM loaded, initializing...');
        document.getElementById('loginTabBtn').onclick = () => switchTab('login');
        document.getElementById('registerTabBtn').onclick = () => switchTab('register');
        document.getElementById('loginBtn').onclick = handleLogin;
        document.getElementById('registerBtn').onclick = handleRegister;
        
        // Auto-fill if there's a referral code
        autoFillReferralCode();
    });
</script>

</body>
</html>
